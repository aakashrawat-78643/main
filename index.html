    <style>
        /* --- CSS Variables for easy styling --- */
        :root {
            --bg-color: #1a1a1a;
            --accent-color: #c5a059;
            /* Muted Gold */
            --text-color: #e0e0e0;
            --font-serif: 'Georgia', serif;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        /* --- Decorative Museum Elements --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 80%);
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 20px;
            animation: fadeIn 1.5s ease;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-color);
        }

        p.subtitle {
            font-style: italic;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* --- The Main Exhibit (Button Container) --- */
        .gallery-container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            animation: slideUp 1s ease-out;
        }

        .button-grid {
            display: grid;
            /* This magic line handles the responsiveness and zooming */
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            justify-content: center;
        }

        /* --- Sample Button Style (Add your buttons here) --- */
        .nav-button {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 20px;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-button:hover {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3);
        }

        /* --- Animations --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <header onclick="play()">

    <main class="gallery-container">

            <a href="https://aakashrawat-78643.github.io/aakashsite/" class="nav-button">Anime Site</a>
            <a href="https://aakashrawat-78643.github.io/java/" class="nav-button">Java Code (CLI)</a>
            <a href="https://adorable-dusk-d1da83.netlify.app/" class="nav-button">Story Maker</a>
            <a href="https://javacli.pythonanywhere.com/" class="nav-button">Notice Board</a>
            <a href="https://124421.pythonanywhere.com/" class="nav-button">Chat</a>

    </main>
    <audio id="aud">
  <source src="intro.mp3" type="audio/mp3">
</audio>

    <footer>
        &copy; 2026 ACHIEVEMENTS.
    </footer>

    <script>
        intro = document.getElementById("aud");
        function play() {
    if (intro.paused) {
        intro.play();
    } else {
        intro.pause();
    }
}
        // JS for a subtle parallax effect on the container
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.gallery-container');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        console.log("Museum Welcome Page Loaded. Grid is ready for buttons.");
    </script>
</body>
